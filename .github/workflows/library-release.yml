name: Library Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: library-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24.16.0'
  LIBRARY_PROJECT: jeap-jwe-client
  LIBRARY_ROOT: projects/jeap-jwe-client
  LIBRARY_DIST: dist/jeap-jwe-client

jobs:
  release:
    name: Build, verify and publish
    runs-on: ubuntu-latest

    # The release runs in the protected "release" environment, which restricts
    # publishing to v* tags / main and scopes the bootstrap NPM_TOKEN secret to
    # this job only. The npm trusted publisher must use the same environment name.
    environment: release

    # While the one-time bootstrap secret NPM_TOKEN exists, the token publish
    # step runs. Once the npm trusted publisher is configured and the secret is
    # deleted, the OIDC publish step takes over automatically (no workflow edit).
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch origin main
          git branch --remote --contains "$GITHUB_SHA" | grep 'origin/main'

      - name: Setup Node.js for npm registry
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Generate current third-party license report
        run: |
          npx --yes license-checker-rseidelsohn \
            --markdown \
            --out THIRD-PARTY-LICENSES.generated.md

      - name: Verify THIRD-PARTY-LICENSES.md is up to date
        run: |
          diff -u "${LIBRARY_ROOT}/THIRD-PARTY-LICENSES.md" THIRD-PARTY-LICENSES.generated.md

      - name: Run library tests
        run: npx ng test ${{ env.LIBRARY_PROJECT }} --watch=false --browsers=ChromeHeadless

      - name: Build library
        run: npx ng build ${{ env.LIBRARY_PROJECT }}

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./${LIBRARY_DIST}/package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          ACTUAL_TAG="${GITHUB_REF_NAME}"

          if [ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Expected tag ${EXPECTED_TAG}, got ${ACTUAL_TAG}"
            exit 1
          fi

      - name: Verify package contents
        run: |
          test -f "${LIBRARY_DIST}/package.json"
          test -f "${LIBRARY_DIST}/README.md"
          test -f "${LIBRARY_DIST}/LICENSE"
          test -f "${LIBRARY_DIST}/CHANGELOG.md"
          test -f "${LIBRARY_DIST}/THIRD-PARTY-LICENSES.md"

          node -e "const p=require('./${LIBRARY_DIST}/package.json'); if (!p.name || !p.version) throw new Error('Missing package name or version'); if (p.private === true) throw new Error('Library package must not be private'); console.log(p.name + '@' + p.version)"

      - name: Create npm package tarball
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm pack

      - name: Upload library dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: jeap-jwe-client-release-dist
          path: ${{ env.LIBRARY_DIST }}
          if-no-files-found: error

      - name: Publish dry run
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm publish --dry-run --access public

      # One-time bootstrap: publish the first version with a temporary token,
      # because npm cannot configure a trusted publisher until the package exists.
      # Remove the NPM_TOKEN secret after configuring trusted publishing on npm;
      # this step then no longer runs. See docs/npm-publishing-setup.md.
      - name: Publish to npm (token bootstrap)
        if: env.HAS_NPM_TOKEN == 'true'
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Steady state: trusted publishing via OIDC. No token is used; provenance
      # is generated automatically. Requires a configured npm trusted publisher
      # for this repository and the library-release.yml workflow.
      - name: Publish to npm (trusted publishing / OIDC)
        if: env.HAS_NPM_TOKEN != 'true'
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm publish --access public
