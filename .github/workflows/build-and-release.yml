name: Build and Release

on:
  push:
    branches:
      - '**' # every branch; tags are excluded so the release marker tag does not re-run CI
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.16.0'
  LIBRARY_PROJECT: jeap-jwe-client
  LIBRARY_ROOT: projects/jeap-jwe-client
  LIBRARY_DIST: dist/jeap-jwe-client

jobs:
  quality:
    name: Lint and format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  license:
    name: Update third-party licenses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.CI_PUSH_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate THIRD-PARTY-LICENSES.md
        run: |
          npx --yes license-checker-rseidelsohn \
            --markdown \
            --out "${LIBRARY_ROOT}/THIRD-PARTY-LICENSES.md"

      - name: Update or verify THIRD-PARTY-LICENSES.md
        run: |
          if [ -z "$(git status --porcelain -- "${LIBRARY_ROOT}/THIRD-PARTY-LICENSES.md")" ]; then
            echo "THIRD-PARTY-LICENSES.md is already up to date."
            exit 0
          fi

          # On main, never write to the branch: fail and require the update via a pull request.
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "THIRD-PARTY-LICENSES.md is out of date on main."
            echo "Regenerate it on a branch and merge it via pull request:"
            echo "npx --yes license-checker-rseidelsohn --markdown --out ${LIBRARY_ROOT}/THIRD-PARTY-LICENSES.md"
            exit 1
          fi

          # On feature branches, regenerate and push the updated file, then fail on purpose.
          # The push creates a new commit, so this run is building stale licenses: the
          # downstream compatibility/package/release jobs must not continue. Failing here
          # notifies the developer; re-running the workflow builds the corrected commit.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${LIBRARY_ROOT}/THIRD-PARTY-LICENSES.md"
          git commit -m "Update third-party licenses"
          git push

          echo "THIRD-PARTY-LICENSES.md was out of date; regenerated it and pushed a new commit."
          echo "Failing this run on purpose so the build is not completed against stale licenses."
          echo "Re-run the workflow (or push again) to build the updated commit."
          exit 1

  compatibility:
    name: Angular ${{ matrix.angular-major }} compatibility
    runs-on: ubuntu-latest
    needs:
      - license

    strategy:
      fail-fast: false
      matrix:
        include:
          - angular-major: '20'
            typescript-version: '~5.9.0'
          - angular-major: '21'
            typescript-version: '~5.9.0'
          - angular-major: '22'
            typescript-version: '~6.0.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked workspace dependencies
        run: npm ci

      - name: Install Angular ${{ matrix.angular-major }} latest patch toolchain
        run: |
          latest_patch() {
            npm view "$1@${{ matrix.angular-major }}" version --json \
              | node -e "const fs = require('node:fs'); const value = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(Array.isArray(value) ? value.at(-1) : value);"
          }

          ANGULAR_VERSION="$(latest_patch '@angular/core')"
          ANGULAR_CLI_VERSION="$(latest_patch '@angular/cli')"
          ANGULAR_BUILD_VERSION="$(latest_patch '@angular-devkit/build-angular')"
          NG_PACKAGR_VERSION="$(latest_patch 'ng-packagr')"

          echo "Angular framework version: ${ANGULAR_VERSION}"
          echo "Angular CLI version: ${ANGULAR_CLI_VERSION}"
          echo "Angular build-angular version: ${ANGULAR_BUILD_VERSION}"
          echo "ng-packagr version: ${NG_PACKAGR_VERSION}"
          echo "TypeScript version: ${{ matrix.typescript-version }}"

          npm install --no-save --package-lock=false \
            @angular/common@"${ANGULAR_VERSION}" \
            @angular/compiler@"${ANGULAR_VERSION}" \
            @angular/core@"${ANGULAR_VERSION}" \
            @angular/forms@"${ANGULAR_VERSION}" \
            @angular/platform-browser@"${ANGULAR_VERSION}" \
            @angular/router@"${ANGULAR_VERSION}" \
            @angular/compiler-cli@"${ANGULAR_VERSION}" \
            @angular/cli@"${ANGULAR_CLI_VERSION}" \
            @angular-devkit/build-angular@"${ANGULAR_BUILD_VERSION}" \
            ng-packagr@"${NG_PACKAGR_VERSION}" \
            typescript@"${{ matrix.typescript-version }}"

      - name: Show effective Angular versions
        run: |
          node <<'NODE'
          const packageNames = [
            '@angular/core',
            '@angular/common',
            '@angular/compiler',
            '@angular/compiler-cli',
            '@angular/cli',
            '@angular-devkit/build-angular',
            'ng-packagr',
            'typescript',
          ];

          for (const packageName of packageNames) {
            const packageJson = require(`${packageName}/package.json`);
            console.log(`${packageName}: ${packageJson.version}`);
          }
          NODE

      - name: Run library tests
        run: npx ng test ${{ env.LIBRARY_PROJECT }} --watch=false --browsers=ChromeHeadless

      - name: Build library
        run: npx ng build ${{ env.LIBRARY_PROJECT }}

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - license
      - compatibility

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run library tests
        run: npx ng test ${{ env.LIBRARY_PROJECT }} --watch=false --browsers=ChromeHeadless

      - name: Build library
        run: npx ng build ${{ env.LIBRARY_PROJECT }}

      - name: Copy workspace license into library dist package
        run: |
          cp LICENSE "${LIBRARY_DIST}/LICENSE"

      - name: Verify package contents
        run: |
          test -f "${LIBRARY_DIST}/package.json"
          test -f "${LIBRARY_DIST}/README.md"
          test -f "${LIBRARY_DIST}/LICENSE"
          test -f "${LIBRARY_DIST}/CHANGELOG.md"
          test -f "${LIBRARY_DIST}/THIRD-PARTY-LICENSES.md"
          node -e "const p=require('./${LIBRARY_DIST}/package.json'); if (!p.name || !p.version) throw new Error('Missing package name or version'); if (p.private === true) throw new Error('Library package must not be private'); console.log(p.name + '@' + p.version)"

      - name: Create npm package tarball
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm pack

      - name: Publish dry run
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm publish --dry-run --access public

      - name: Upload library dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: jeap-jwe-client-dist
          path: ${{ env.LIBRARY_DIST }}
          if-no-files-found: error

  release:
    name: Release to npm
    runs-on: ubuntu-latest
    needs:
      - quality
      - license
      - compatibility
      - package
    # Only on main (push or manual dispatch), after all checks pass. The "already
    # released" guard below makes a no-version-bump merge a no-op.
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    # The release runs in the protected "release" environment, which scopes the
    # bootstrap NPM_TOKEN secret to this job. The npm trusted publisher must be
    # configured for this workflow file (build-and-release.yml) and the same environment.
    environment: release

    permissions:
      contents: write # push the release tag with the default GITHUB_TOKEN
      id-token: write # OIDC token for npm trusted publishing

    # While the one-time bootstrap secret NPM_TOKEN exists, the token publish step
    # runs. Once the npm trusted publisher is configured and the secret is deleted,
    # the OIDC publish step takes over automatically (no workflow edit).
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine release version and tag
        id: version
        run: |
          VERSION=$(node -p "require('./${LIBRARY_ROOT}/package.json').version")
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Skip if this version is already released
        id: guard
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null \
            || git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; ${TAG} is already released. Skipping."
            echo "release=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Releasing ${TAG}."
            echo "release=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Node.js for npm registry
        if: steps.guard.outputs.release == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        if: steps.guard.outputs.release == 'true'
        run: npm install -g npm@latest

      - name: Install dependencies
        if: steps.guard.outputs.release == 'true'
        run: npm ci

      - name: Verify THIRD-PARTY-LICENSES.md is up to date
        if: steps.guard.outputs.release == 'true'
        run: |
          npx --yes license-checker-rseidelsohn \
            --markdown \
            --out THIRD-PARTY-LICENSES.generated.md
          diff -u "${LIBRARY_ROOT}/THIRD-PARTY-LICENSES.md" THIRD-PARTY-LICENSES.generated.md

      - name: Build library
        if: steps.guard.outputs.release == 'true'
        run: npx ng build ${{ env.LIBRARY_PROJECT }}

      - name: Copy workspace license into library dist package
        if: steps.guard.outputs.release == 'true'
        run: cp LICENSE "${LIBRARY_DIST}/LICENSE"

      - name: Verify package contents
        if: steps.guard.outputs.release == 'true'
        run: |
          test -f "${LIBRARY_DIST}/package.json"
          test -f "${LIBRARY_DIST}/README.md"
          test -f "${LIBRARY_DIST}/LICENSE"
          test -f "${LIBRARY_DIST}/CHANGELOG.md"
          test -f "${LIBRARY_DIST}/THIRD-PARTY-LICENSES.md"
          node -e "const p=require('./${LIBRARY_DIST}/package.json'); if (!p.name || !p.version) throw new Error('Missing package name or version'); if (p.private === true) throw new Error('Library package must not be private'); console.log(p.name + '@' + p.version)"

      - name: Publish to npm (token bootstrap)
        if: steps.guard.outputs.release == 'true' && env.HAS_NPM_TOKEN == 'true'
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (trusted publishing / OIDC)
        if: steps.guard.outputs.release == 'true' && env.HAS_NPM_TOKEN != 'true'
        working-directory: ${{ env.LIBRARY_DIST }}
        run: npm publish --access public

      # Record the published version with a tag (default GITHUB_TOKEN is enough;
      # the tag is a marker and idempotency guard, not a release trigger).
      - name: Tag the published version
        if: steps.guard.outputs.release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Published and tagged ${TAG}."
